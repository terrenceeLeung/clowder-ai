# F237: Prompt Injection Manifest
# Machine-readable registry of all segments injected into the effective prompt.
# Source of truth for Console visibility, drift checking, and Phase 2 lifecycle migration.
#
# Schema version: 1.0.0
# Total active segments: 52 (L1-L7, S1-S13, D1-D21, R1-R2, M1-M2, B1, C1, N1-N2, H1-H3)
# Excluded (dead code): 0 (X1 fully removed in F237 Phase 1 including source function)
#
# Three-axis classification (orthogonal):
#   safetyTier        — Can a human edit this?        (readonly | limited-edit | editable)
#   transparencyTier  — Can the user see this?        (visible-by-default | opt-in-view | debug-only)
#   governanceTier    — Can auto harness change this? (auto-evolve | human-gated | immutable)
#
# Console badge mapping (tag-based):
#   只读               ← safetyTier: readonly
#   可编辑             ← safetyTier: editable/limited-edit + governanceTier: immutable
#   可编辑 + 人工审批   ← safetyTier: editable/limited-edit + governanceTier: human-gated
#   可编辑 + 自动迭代   ← safetyTier: editable/limited-edit + governanceTier: auto-evolve


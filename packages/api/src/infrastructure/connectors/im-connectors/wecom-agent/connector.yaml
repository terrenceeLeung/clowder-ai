id: wecom-agent
name: 企微自建应用
nameEn: WeCom Agent
version: 1.0.0
icon:
  type: png
  src: /images/connectors/wecom-agent.png
themeColor: '#7C3AED'
docsUrl: https://work.weixin.qq.com/wework_admin/frame#/app

config:
  - envName: WECOM_CORP_ID
    label: Corp ID (企业 ID)
    sensitive: false
    required: true
  - envName: WECOM_AGENT_ID
    label: Agent ID (应用 ID)
    sensitive: false
    required: true
  - envName: WECOM_AGENT_SECRET
    label: Agent Secret
    sensitive: true
    required: true
  - envName: WECOM_TOKEN
    label: 回调 Token
    sensitive: true
    required: true
  - envName: WECOM_ENCODING_AES_KEY
    label: EncodingAESKey (43 字符)
    sensitive: true
    required: true

steps:
  - text: 点击上方链接登录企微管理后台 → 创建自建应用，获取 AgentId 和 Secret
  - text: 在「API 接收消息」中设置回调 URL、Token 和 EncodingAESKey
  - text: 回调 URL 需通过公网访问（可使用 Cloudflare Tunnel）
  - text: 填写以下配置并保存，重启 API 服务后生效
